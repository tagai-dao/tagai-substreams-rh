syntax = "proto3";

import "google/protobuf/timestamp.proto";

package contract.v1;
message Events {
    repeated Pump_CreateFeeChanged pump_create_fee_changeds = 1;
    repeated Pump_FeeAddressChanged pump_fee_address_changeds = 2;
    repeated Pump_FeeRatiosChanged pump_fee_ratios_changeds = 3;
    repeated Pump_IpShareChanged pump_ip_share_changeds = 4;
    repeated Pump_NewToken pump_new_tokens = 5;
    repeated Pump_NutboxAllocationParked pump_nutbox_allocation_parkeds = 6;
    repeated Pump_NutboxLinked pump_nutbox_linkeds = 7;
    repeated Pump_OwnershipTransferStarted pump_ownership_transfer_starteds = 8;
    repeated Pump_OwnershipTransferred pump_ownership_transferreds = 9;
}

message TokenEvents {
    repeated Token_Trade trades = 1;
    repeated Token_Transfer transfers = 2;
    repeated Token_ListedToDex listed_to_dex = 3;
    repeated Token_Trade swap_trades = 4;
}

message IPShareEvents {
    repeated IPShare_Create creates = 1;
    repeated IPShare_Trade trades = 2;
    repeated IPShare_ValueCaptured value_captures = 3;
    repeated IPShare_Stake stakes = 4;
}

message WalnutEvents { repeated Walnut_Event events = 1; }

message BasketRegistryEvents { repeated Basket_Created creations = 1; }

message BasketEvents {
    repeated Basket_Trade trades = 1;
    repeated Basket_Operation operations = 2;
    repeated Basket_FeeAccrual fee_accruals = 3;
    repeated Basket_FeeClaim fee_claims = 4;
    repeated Basket_AuctionEvent auction_events = 5;
    repeated Basket_Rebalance rebalances = 6;
}

message Basket_Created {
    string evt_tx_hash = 1; uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3; uint64 evt_block_number = 4; uint64 evt_ordinal = 5;
    bytes basket = 6; bytes creator = 7; bytes registrar = 8;
    uint32 version = 9; uint64 created_at = 10; bytes salt = 11;
    bytes evt_block_hash = 12;
}

message Basket_Trade {
    string evt_tx_hash = 1; uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3; uint64 evt_block_number = 4; uint64 evt_ordinal = 5;
    bytes basket = 6; bool is_buy = 7; bytes payer = 8; bytes recipient = 9; bytes frontend = 10;
    string usdg_amount = 11; string basket_amount = 12; string fee_weth = 13;
    bool routed = 14; uint32 router_evt_index = 15; bytes evt_block_hash = 16;
}

message Basket_Operation {
    string kind = 1;
    string evt_tx_hash = 2; uint32 evt_index = 3;
    google.protobuf.Timestamp evt_block_time = 4; uint64 evt_block_number = 5; uint64 evt_ordinal = 6;
    bytes basket = 7; bytes account = 8; bytes recipient = 9; bytes asset = 10;
    string amount = 11; bytes evt_block_hash = 12;
}

message Basket_FeeAccrual {
    string evt_tx_hash = 1; uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3; uint64 evt_block_number = 4; uint64 evt_ordinal = 5;
    bytes basket = 6; string holder_amount = 7; string auction_amount = 8;
    string creator_amount = 9; string launcher_amount = 10;
    bytes frontend = 11; string frontend_amount = 12; bytes evt_block_hash = 13;
}

message Basket_FeeClaim {
    string claim_type = 1;
    string evt_tx_hash = 2; uint32 evt_index = 3;
    google.protobuf.Timestamp evt_block_time = 4; uint64 evt_block_number = 5; uint64 evt_ordinal = 6;
    bytes basket = 7; bytes beneficiary = 8; string amount = 9; bytes evt_block_hash = 10;
}

message Basket_AuctionEvent {
    string kind = 1;
    string evt_tx_hash = 2; uint32 evt_index = 3;
    google.protobuf.Timestamp evt_block_time = 4; uint64 evt_block_number = 5; uint64 evt_ordinal = 6;
    string auction_id = 7; bytes account = 8; bytes recipient = 9;
    string amount = 10; string secondary_amount = 11; string spot_quote = 12;
    string initial_bid = 13; uint64 end_time = 14; bytes evt_block_hash = 15;
}

message Basket_Rebalance {
    string evt_tx_hash = 1; uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3; uint64 evt_block_number = 4; uint64 evt_ordinal = 5;
    bytes basket = 6; string nav_before = 7; string nav_after = 8; bytes evt_block_hash = 9;
}

message Walnut_Event {
    string kind = 1;
    string evt_tx_hash = 2; uint32 evt_index = 3;
    google.protobuf.Timestamp evt_block_time = 4; uint64 evt_block_number = 5; uint64 evt_ordinal = 6;
    bytes contract = 7; bytes community = 8; bytes pool = 9; bytes account = 10;
    bytes asset = 11; bytes secondary_account = 12; string name = 13;
    string amount = 14; string secondary_amount = 15; bool flag = 16;
    uint32 ratio = 17; repeated bytes pools = 18; repeated uint32 ratios = 19;
    bytes operator = 20;
    bytes pool_factory = 21;
    bytes evt_block_hash = 22;
}

message IPShare_Create {
    string evt_tx_hash = 1; uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3; uint64 evt_block_number = 4;
    bytes subject = 5; string amount = 6; string create_fee = 7; uint64 evt_ordinal = 8;
    bytes evt_block_hash = 9;
}
message IPShare_Trade {
    string evt_tx_hash = 1; uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3; uint64 evt_block_number = 4;
    bytes trader = 5; bytes subject = 6; bool is_buy = 7; string share_amount = 8;
    string eth_amount = 9; string protocol_eth_amount = 10;
    string subject_eth_amount = 11; string supply = 12; uint64 evt_ordinal = 13;
    bytes evt_block_hash = 14;
}
message IPShare_ValueCaptured {
    string evt_tx_hash = 1; uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3; uint64 evt_block_number = 4;
    bytes subject = 5; bytes investor = 6; string amount = 7; uint64 evt_ordinal = 8;
    bytes evt_block_hash = 9;
}
message IPShare_Stake {
    string evt_tx_hash = 1; uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3; uint64 evt_block_number = 4;
    bytes staker = 5; bytes subject = 6; bool is_stake = 7;
    string amount = 8; string staked_amount = 9; uint64 evt_ordinal = 10;
    bytes evt_block_hash = 11;
}

message Token_Trade {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes token = 5;
    bytes buyer = 6;
    bytes sellsman = 7;
    bool is_buy = 8;
    string token_amount = 9;
    string eth_amount = 10;
    string tiptag_fee = 11;
    string sellsman_fee = 12;
    uint64 evt_ordinal = 13;
    string price = 14;
    bytes evt_block_hash = 15;
}

message Token_Transfer {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes token = 5;
    bytes from = 6;
    bytes to = 7;
    string amount = 8;
    uint64 evt_ordinal = 9;
    bytes evt_block_hash = 10;
}

message Token_ListedToDex {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes token = 5;
    bytes event_token = 6;
    bytes pool_id = 7;
    string sqrt_price_x96 = 8;
    uint64 evt_ordinal = 9;
    bytes evt_block_hash = 10;
}
message Pump_CreateFeeChanged {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    string old_fee = 5;
    string new_fee = 6;
}
message Pump_FeeAddressChanged {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes old_address = 5;
    bytes new_address = 6;
}
message Pump_FeeRatiosChanged {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    string donut_fee = 5;
    string sellsman_fee = 6;
}
message Pump_IpShareChanged {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes old_ip_share = 5;
    bytes new_ip_share = 6;
}
message Pump_NewToken {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    string tick = 5;
    bytes token = 6;
    bytes creator = 7;
    uint64 evt_ordinal = 8;
    bytes evt_block_hash = 9;
}
message Pump_NutboxAllocationParked {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes token = 5;
    bytes hook = 6;
    string amount = 7;
}
message Pump_NutboxLinked {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes token = 5;
    bytes community = 6;
    bytes social_pool = 7;
}
message Pump_OwnershipTransferStarted {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes previous_owner = 5;
    bytes new_owner = 6;
}
message Pump_OwnershipTransferred {
    string evt_tx_hash = 1;
    uint32 evt_index = 2;
    google.protobuf.Timestamp evt_block_time = 3;
    uint64 evt_block_number = 4;
    bytes previous_owner = 5;
    bytes new_owner = 6;
}
  
